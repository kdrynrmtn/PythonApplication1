name: Python CI Pipeline

on:
  push:
    branches: [ "master", "main", "phase-3" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Kodlari Cek (Checkout)
      uses: actions/checkout@v3
      
    - name: Python Ortamini Kur
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Derleme ve Syntax Kontrolu
      run: |
        python -m py_compile src/spagetti_code.py
        echo "Kod basariyla derlendi ve soz dizimi (syntax) hatasi bulunamadi!"